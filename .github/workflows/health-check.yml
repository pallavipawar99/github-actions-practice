name: Scheduled Health Check

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allows manual testing from the Actions tab

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull and Run Container
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest
          docker run -d --name app-check -p 8000:8000 ${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest
          sleep 5 # Wait for FastAPI to start

      - name: Check Health Endpoint
        id: check
        run: |
          RESPONSE=$(curl -s http://localhost:8000/health)
          if [[ "$RESPONSE" == *'{"status":"ok"}'* ]]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
            echo "Health check successful!"
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "Health check failed! Response: $RESPONSE"
            docker logs app-check
            exit 1
          fi

      - name: Create Summary
        if: always() # Ensure report is created even if tests fail
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ secrets.DOCKER_USERNAME }}/fastapi-capstone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.check.outputs.status || 'FAILED' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date)" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup
        if: always()
        run: |
          docker stop app-check
          docker rm app-check
