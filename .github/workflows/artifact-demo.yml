name: Artifact Demo

on:
  push:

jobs:
  generate-artifact:
    runs-on: ubuntu-latest

    steps:
      - name: Generate report file
        run: |
          echo "Test Report" > report.txt
          echo "All tests passed" >> report.txt
          echo "Generated on: $(date)" >> report.txt
          cat report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt