name: Artifact Between Jobs

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Create report file
        run: |
          echo "Build Report" > report.txt
          echo "Build successful" >> report.txt
          echo "Generated on: $(date)" >> report.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: report.txt

  use-artifact:
    runs-on: ubuntu-latest
    needs: generate

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build-report
          path: ./downloaded-artifacts

      - name: Print artifact contents
        run: |
          echo "Reading artifact:"
          cat build-report