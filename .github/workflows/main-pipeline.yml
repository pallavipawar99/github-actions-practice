name: Main Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  # 1. Call the reusable build-test workflow (Runs for BOTH Push and PR)
  call-build-and-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: '3.10'
      run_tests: true

  # 2. Build & Push Docker Image (ONLY for Push to main, NOT for PRs)
  deploy-docker:
    needs: call-build-and-test
    if: github.event_name == 'push' && needs.call-build-and-test.outputs.test_result == 'passed'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: 'fastapi-capstone'
      tag: 'latest'
    secrets: inherit

  # 3. PR Summary Comment (ONLY for Pull Requests)
  pr-comment:
    needs: call-build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Print PR Summary
        run: |
          echo "PR checks passed for branch: ${{ github.head_ref }}"
          echo "Test Result: ${{ needs.call-build-and-test.outputs.test_result }}"
