name: Main Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 1: Call the reusable workflow
  call-build-and-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: '3.10'
      run_tests: true

  # Job 2: Process the results
  check-results:
    needs: call-build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Print Test Status
        run: |
          echo "The reusable workflow reported: ${{ needs.call-build-and-test.outputs.test_result }}"

      - name: Final Validation
        # This step fails the pipeline if the reusable workflow output isn't 'passed'
        if: ${{ needs.call-build-and-test.outputs.test_result != 'passed' }}
        run: |
          echo "::error::Tests failed in the reusable workflow. Stopping pipeline."
          exit 1

      - name: Success Message
        if: ${{ needs.call-build-and-test.outputs.test_result == 'passed' }}
        run: echo "Tests passed! Ready for the next stage."
