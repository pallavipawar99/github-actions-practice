name: Main Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  # --- CI/CD SECTION ---
  call-build-and-test:
    if: github.event_name != 'schedule'
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      python_version: '3.10'
      run_tests: true

  deploy-docker:
    needs: call-build-and-test
    if: github.event_name == 'push' && needs.call-build-and-test.outputs.test_result == 'passed'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: 'fastapi-capstone'
      tag: "latest" # Use latest for health check consistency
    secrets:
      docker_username: ${{ vars.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  deploy-prod:
    needs: deploy-docker
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Final Production Deploy
        run: echo "Deploying image ${{ needs.deploy-docker.outputs.image_url }}..."

  # --- IMPROVED HEALTH CHECK SECTION ---
  health-check:
    # Only runs on Schedule or Manual, OR after a successful Docker push
    if: |
      always() && 
      (github.event_name == 'schedule' || 
       github.event_name == 'workflow_dispatch' || 
       (github.event_name == 'push' && needs.deploy-docker.result == 'success'))
    needs: [deploy-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Pull and Start Container
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest
          docker run -d --name app-check -p 8000:8000 ${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest
          
          # Use a retry loop instead of just 'sleep' to avoid Error 7
          echo "Waiting for app to be ready..."
          timeout 30s bash -c 'until curl -s localhost:8000/health; do sleep 2; done'

      - name: Verify Health
        id: check
        run: |
          # The timeout above ensures it's up, now we check the content
          RESPONSE=$(curl -s http://localhost:8000/health)
          if [[ "$RESPONSE" == *'"status":"ok"'* ]]; then
            echo "status=PASSED" >> $GITHUB_OUTPUT
          else
            echo "::error::Response was $RESPONSE"
            docker logs app-check
            exit 1
          fi

      - name: Create Summary Report
        if: always()
        run: |
          echo "## Health Check Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ vars.DOCKER_USERNAME }}/fastapi-capstone:latest" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.check.outputs.status || 'FAILED' }} 🚀" >> $GITHUB_STEP_SUMMARY
          docker rm -f app-check || true
