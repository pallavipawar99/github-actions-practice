name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.9'
        type: string
      run_tests:
        description: 'Whether to run pytest'
        required: false
        default: true
        type: boolean
    outputs:
      test_result:
        description: "The result of the test step"
        value: ${{ jobs.build-and-test.outputs.status }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.set-output.outputs.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn httpx pytest  # httpx is needed for TestClient

      - name: Run tests
        if: ${{ inputs.run_tests }}
        id: test-step
        # continue-on-error allows us to capture the failure for the output
        continue-on-error: true
        run: python -m pytest test_app.py

      - name: Set output result
        id: set-output
        run: |
          if [ "${{ steps.test-step.outcome }}" == "success" ]; then
            echo "result=passed" >> $GITHUB_OUTPUT
          else
            echo "result=failed" >> $GITHUB_OUTPUT
          fi
