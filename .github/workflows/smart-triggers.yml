name: Smart Triggers

on:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'src/**'
      - 'app/**'
    paths-ignore:
      - '*.md'
      - 'docs/**'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Run Core Logic Tests
        run: echo "Changes detected in src/ or app/. Running tests..."
